# .github/workflows/funcheck.yaml
#
# Per-test-script funcheck analysis with fail-fast:
#   Pass 1 (-jc)   — malloc site coverage: every allocation must NULL-check.
#   Pass 2 (-jac)  — allocation tracking: record what is not freed before exec/exit.
#
# Runs one matrix job per mandatory test script. fail-fast: true cancels all
# remaining queued jobs as soon as any single script reports an error.

name: Funcheck

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - evaluation
      - fixvm

# Cancel any in-progress funcheck run for the same branch or PR when a new
# commit is pushed, so stale runs don't occupy runners unnecessarily.
concurrency:
  group: funcheck-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HOME: /home/runner
  TESTER_REPO: https://github.com/LeaYeh/42_minishell_tester.git
  TESTER_DIR: /home/runner/42_minishell_tester
  FC_DIR: /home/runner/funcheck

jobs:
  prepare_matrix:
    name: Prepare Test Matrix
    runs-on: ubuntu-latest
    outputs:
      test_matrix: ${{ steps.prep_matrix.outputs.TEST_MATRIX }}
    steps:
      - name: Clone tester repository
        run: |
          git clone \
            "${{ secrets.TESTER_REPO != '' && secrets.TESTER_REPO || env.TESTER_REPO }}" \
            "${{ env.TESTER_DIR }}"
      - name: Prepare matrix
        id: prep_matrix
        run: |
          FILES=$(find ${{ env.TESTER_DIR }}/cmds/mand -name '*.sh' \
            -exec basename {} \; | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "TEST_MATRIX=${FILES}" >> "$GITHUB_OUTPUT"

  funcheck:
    name: Funcheck (${{ matrix.test_script }})
    needs: prepare_matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        test_script: ${{ fromJson(needs.prepare_matrix.outputs.test_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up environment (funcheck, clang-12, tester)
        uses: ./.github/actions/setup
        with:
          tester_dir: ${{ env.TESTER_DIR }}

      - name: Add funcheck to PATH
        run: echo "$HOME/.local/funcheck/host" >> $GITHUB_PATH

      - name: Build with clang-12
        run: make re CC=clang-12

      - name: Generate test input for ${{ matrix.test_script }}
        run: |
          mkdir -p $FC_DIR
          sed '/^[[:space:]]*#/d;/^[[:space:]]*$/d' \
            $TESTER_DIR/cmds/mand/${{ matrix.test_script }} | tr -d '\r' > $FC_DIR/input.txt
          echo exit >> $FC_DIR/input.txt
          echo "Input: $(wc -l < $FC_DIR/input.txt) lines from ${{ matrix.test_script }}"

      - name: Collect readline ignore flags
        run: |
          args=$(grep -v '^[[:space:]]*#' readline_ignore.txt \
                 | grep -v '^[[:space:]]*$' \
                 | awk '{print "-i " $1}' | tr '\n' ' ')
          echo "IGNORE_ARGS=$args" >> "$GITHUB_ENV"

      - name: "Pass 1: malloc site coverage (-jc)"
        run: |
          funcheck -jc $IGNORE_ARGS ./minishell \
            < $FC_DIR/input.txt \
            > $FC_DIR/pass1.json 2> $FC_DIR/pass1.err || true

      - name: "Pass 2: allocation tracking (-jac)"
        run: |
          funcheck -jac $IGNORE_ARGS ./minishell \
            < $FC_DIR/input.txt \
            > $FC_DIR/pass2.json 2> $FC_DIR/pass2.err || true

      - name: Summarize results
        run: |
          chmod +x .github/scripts/funcheck_summary.py
          python3 .github/scripts/funcheck_summary.py \
            $FC_DIR/pass1.json $FC_DIR/pass2.json

      - name: Upload funcheck artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: funcheck-${{ matrix.test_script }}-${{ github.run_id }}
          path: |
            ${{ env.FC_DIR }}/pass1.json
            ${{ env.FC_DIR }}/pass2.json
            ${{ env.FC_DIR }}/pass1.err
            ${{ env.FC_DIR }}/pass2.err
            ${{ env.FC_DIR }}/input.txt
          retention-days: 30
