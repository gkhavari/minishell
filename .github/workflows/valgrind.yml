name: CI - Valgrind Leak & Crash Check

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  valgrind:
    name: Valgrind on Ubuntu (mandatory tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            libreadline-dev \
            libncurses-dev \
            valgrind \
            python3

      - name: Build (debug symbols)
        run: make re CFLAGS="-Wall -Wextra -Werror -g -I includes -I libft -I /usr/include"

      - name: Clone 42 minishell tester
        run: |
          git clone --depth=1 \
            https://github.com/zstenger93/42_minishell_tester.git \
            "$HOME/42_minishell_tester"
          # patch tester path to find our binary
          echo "Tester cloned."

      - name: Run local hardening tests
        run: |
          chmod +x tests/test_hardening.sh tests/test_phase1.sh
          bash tests/test_phase1.sh   | tee /tmp/phase1.log
          bash tests/test_hardening.sh | tee /tmp/hardening.log

      - name: Run 42 mandatory tests
        id: mandatory
        run: |
          cd "$HOME/42_minishell_tester"
          timeout 10m bash tester.sh m 2>&1 | tee /tmp/mandatory.log || true
        env:
          MINISHELL_PATH: ${{ github.workspace }}

      - name: Run 42 mandatory tests with Valgrind
        id: valgrind_run
        run: |
          cd "$HOME/42_minishell_tester"
          timeout 30m bash tester.sh vm 2>&1 | tee /tmp/valgrind.log || true
        env:
          MINISHELL_PATH: ${{ github.workspace }}

      - name: Build valgrind summary report
        if: always()
        run: |
          # --- Counts (strip ANSI for parsing) ---
          strip_ansi() { sed 's/\x1b\[[0-9;]*m//g'; }
          phase1_log=$(cat /tmp/phase1.log 2>/dev/null | strip_ansi)
          hard_log=$(cat /tmp/hardening.log 2>/dev/null | strip_ansi)
          mand_log=$(cat /tmp/mandatory.log 2>/dev/null | strip_ansi)
          valg_log=$(cat /tmp/valgrind.log 2>/dev/null | strip_ansi)

          phase1_pass=$(echo "$phase1_log" | grep -oP 'Passed:\s*\K[0-9]+' | tail -1 || echo "0")
          phase1_fail=$(echo "$phase1_log" | grep -oP 'Failed:\s*\K[0-9]+' | tail -1 || echo "0")
          hard_pass=$(echo "$hard_log"   | grep -oP 'Passed:\s*\K[0-9]+' | tail -1 || echo "0")
          hard_fail=$(echo "$hard_log"   | grep -oP 'Failed:\s*\K[0-9]+' | tail -1 || echo "0")
          # 42_minishell_tester uses ✅ (pass) and ❌ (fail); final block has "TESTS PASSED: N" and "❌ N"
          mand_total=$(echo "$mand_log" | grep -oP 'TOTAL TEST COUNT:\s*\K[0-9]+' | tail -1 || echo "0")
          mand_pass=$(echo "$mand_log"  | grep -oP 'TESTS PASSED:\s*\K[0-9]+'   | tail -1 || echo "0")
          mand_fail=$((mand_total - mand_pass))
          [ "$mand_fail" -lt 0 ] 2>/dev/null && mand_fail=0
          # Fallback: count ✅ / ❌ lines (test lines with any pass/fail) if RESULT block not found
          if [ "${mand_total:-0}" -eq 0 ] && [ "${mand_pass:-0}" -eq 0 ]; then
            mand_pass=$(echo "$mand_log" | grep -c '✅' 2>/dev/null || echo "0")
            mand_fail=$(echo "$mand_log" | grep -c '❌' 2>/dev/null || echo "0")
          fi

          valg_total=$(echo "$valg_log" | grep -oP 'TOTAL TEST COUNT:\s*\K[0-9]+' | tail -1 || echo "0")
          valg_pass=$(echo "$valg_log"  | grep -oP 'TESTS PASSED:\s*\K[0-9]+'   | tail -1 || echo "0")
          valg_fail=$((valg_total - valg_pass))
          [ "$valg_fail" -lt 0 ] 2>/dev/null && valg_fail=0
          valg_leaks=$(echo "$valg_log" | grep -oP 'LEAKING:\s*\K[0-9]+' | tail -1 || echo "0")
          if [ "${valg_total:-0}" -eq 0 ] && [ "${valg_pass:-0}" -eq 0 ]; then
            valg_pass=$(echo "$valg_log" | grep -c '✅' 2>/dev/null || echo "0")
            valg_fail=$(echo "$valg_log" | grep -c '❌' 2>/dev/null || echo "0")
          fi

          mand_ok=$mand_pass
          mand_ko=$mand_fail
          valg_ok=$valg_pass
          valg_ko=$valg_fail
          def_lost=$(echo "$valg_log" | grep -oP 'definitely lost: \K[0-9]+' | head -1 || echo "0")
          err_summary=$(echo "$valg_log" | grep -oP 'ERROR SUMMARY: \K[0-9]+' | head -1 || echo "0")

          {
            echo "## Minishell Valgrind Report"
            echo ""
            echo "**Branch:** ${{ github.ref_name }}"
            echo "**Commit:** ${{ github.sha }}"
            echo "**Date:** $(date -u)"
            echo ""
            echo "### Summary"
            echo "| Suite | Passed | Failed |"
            echo "|-------|--------|--------|"
            echo "| Phase 1 (local) | $phase1_pass | $phase1_fail |"
            echo "| Hardening (local) | $hard_pass | $hard_fail |"
            echo "| Mandatory (no valgrind) | $mand_ok | $mand_ko |"
            echo "| Mandatory + Valgrind | $valg_ok | $valg_ko |"
            echo ""
            echo "**Valgrind:** \`definitely lost: $def_lost\` · \`ERROR SUMMARY: $err_summary\` · \`LEAKING (tester): $valg_leaks\`"
            echo ""
            echo "---"
            echo ""
            echo "### Failures (grep)"
            echo ""
            echo "#### Phase 1 failures"
            echo '```'
            echo "$phase1_log" | grep -E '\[FAIL\]|FAIL' 2>/dev/null | head -30 || echo "(none or no log)"
            echo '```'
            echo ""
            echo "#### Hardening failures"
            echo '```'
            echo "$hard_log" | grep -E '\[FAIL\]|FAIL' 2>/dev/null | head -30 || echo "(none or no log)"
            echo '```'
            echo ""
            echo "#### Mandatory test failures (no valgrind) — lines with ❌"
            echo '```'
            echo "$mand_log" | grep '❌' 2>/dev/null | head -50 || echo "(none or no log)"
            echo '```'
            echo ""
            echo "#### Mandatory + Valgrind failures — lines with ❌"
            echo '```'
            echo "$valg_log" | grep '❌' 2>/dev/null | head -50 || echo "(none or no log)"
            echo '```'
            echo ""
            echo "#### Valgrind issues (leaks / errors)"
            echo '```'
            echo "$valg_log" | grep -E 'definitely lost|possibly lost|ERROR SUMMARY|Invalid read|Invalid write' 2>/dev/null | head -50 || echo "(none or no log)"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "### Local Hardening (last 20 lines)"
            echo '```'
            tail -20 /tmp/hardening.log 2>/dev/null || echo "(no output)"
            echo '```'
            echo ""
            echo "### Mandatory Tests (no valgrind) — RESULT block + ✅/❌ lines"
            echo '```'
            echo "$mand_log" | grep -E 'RESULT|TOTAL TEST COUNT|TESTS PASSED|LEAKING|❌|✅' 2>/dev/null | tail -50 || echo "(no output)"
            echo '```'
            echo ""
            echo "### Valgrind Results — RESULT block + leak/error lines"
            echo '```'
            echo "$valg_log" | grep -E 'RESULT|TOTAL TEST COUNT|TESTS PASSED|LEAKING|ERROR SUMMARY|definitely lost|possibly lost|❌|✅' 2>/dev/null | tail -80 || echo "(no output)"
            echo '```'
          } > valgrind_report.md

      - name: Upload valgrind report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-report-${{ github.sha }}
          path: valgrind_report.md

      - name: Upload raw logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.sha }}
          path: |
            /tmp/phase1.log
            /tmp/hardening.log
            /tmp/mandatory.log
            /tmp/valgrind.log

      - name: Show summary
        if: always()
        run: |
          echo "====== VALGRIND REPORT ======"
          cat valgrind_report.md

      # Fail the job if valgrind found definite leaks
      - name: Check for definite leaks
        run: |
          if grep -q "definitely lost: [^0]" /tmp/valgrind.log 2>/dev/null; then
            echo "❌ DEFINITE MEMORY LEAKS FOUND!"
            grep "definitely lost" /tmp/valgrind.log
            exit 1
          fi
          echo "✅ No definite memory leaks detected."
